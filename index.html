<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trauma & Emergency On-call</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            padding: 20px;
            border-bottom: 2px solid var(--bg);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .logo { height: 40px; width: auto; }
        header h2 { font-size: 1.1rem; color: var(--primary-dark); }

        .controls { display: flex; gap: 8px; }
        input[type="date"] {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--accent);
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }

        /* TABLE CORE STYLES */
        .content { padding: 15px; }
        table { width: 100%; border-collapse: collapse; }
        
        /* DESKTOP VIEW */
        @media (min-width: 769px) {
            th {
                text-align: left;
                padding: 12px;
                background: #f8fafc;
                color: var(--text-muted);
                font-size: 0.75rem;
                text-transform: uppercase;
                border-bottom: 2px solid var(--accent);
            }
            td { padding: 12px; border-bottom: 1px solid var(--accent); }
            .dept-name { font-weight: 700; width: 20%; }
        }

        /* MOBILE STACKED VIEW - This makes it fit "on screen" */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; } /* Hide headers on mobile */
            
            tr {
                margin-bottom: 15px;
                border: 1px solid var(--accent);
                border-radius: 10px;
                padding: 10px;
                background: white;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px dashed var(--accent);
                text-align: right;
            }

            td:last-child { border-bottom: none; }

            /* Add labels before the data */
            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--text-muted);
                font-size: 0.8rem;
                text-align: left;
                padding-right: 10px;
            }

            .dept-name {
                background: var(--primary);
                color: white;
                margin: -10px -10px 10px -10px;
                padding: 10px;
                border-radius: 10px 10px 0 0;
                justify-content: center;
                font-size: 1rem;
            }
            .dept-name::before { display: none; }
        }

        .name-pill {
            background: #eff6ff;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #dbeafe;
        }

        .null-text { color: #cbd5e1; font-style: italic; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="brand">
            <img src="https://website.aiimsraipur.edu.in/web_image/lg1.png" class="logo" alt="Logo">
            <h2>Trauma & Emergency Roster</h2>
        </div>
        <div class="controls">
            <input type="date" id="datePicker">
            <button onclick="init()">Update</button>
        </div>
    </header>

    <div class="content">
        <table id="rosterTable">
            <thead>
                <tr>
                    <th>Dept</th>
                    <th>On Call 1</th>
                    <th>On Call 2</th>
                    <th>Senior Res.</th>
                    <th>Consultant</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const DEPARTMENTS = ["ctvs", "medicine", "surgery"];

// Default Date
const now = new Date();
if(now.getHours() < 8) now.setDate(now.getDate() - 1);
document.getElementById("datePicker").value = now.toISOString().split('T')[0];

async function loadCSV(file) {
    try {
        const res = await fetch(file);
        if(!res.ok) return null;
        const text = await res.text();
        return text.split("\n").filter(r => r.trim()).map(r => r.split(","));
    } catch { return null; }
}

function getValue(row, header, key) {
    const idx = header.map(h => h.trim()).indexOf(key);
    return (idx !== -1 && row[idx]) ? row[idx].trim() : null;
}

function formatCell(name) {
    if(!name || name === "<null>") return `<span class="null-text">None</span>`;
    return `<span class="name-pill">${name}</span>`;
}

async function init() {
    const rawDate = document.getElementById("datePicker").value;
    const parts = rawDate.split('-');
    const date = `${parts[2]}/${parts[1]}/${parts[0]}`;
    const tbody = document.getElementById("tableBody");
    
    tbody.innerHTML = "Loading...";

    let rowsHTML = "";
    for(const dept of DEPARTMENTS) {
        const data = await loadCSV(`call_data/${dept}.csv`);
        if(!data) continue;

        const header = data[0];
        const dateIdx = header.map(h => h.trim().toLowerCase()).indexOf("date");
        const row = data.find((r, i) => i > 0 && r[dateIdx]?.trim() === date);

        if(row) {
            rowsHTML += `
                <tr>
                    <td class="dept-name">${dept.toUpperCase()}</td>
                    <td data-label="On Call 1">${formatCell(getValue(row, header, "on_call1"))}</td>
                    <td data-label="On Call 2">${formatCell(getValue(row, header, "on_call2"))}</td>
                    <td data-label="SR">${formatCell(getValue(row, header, "on_call_SR"))}</td>
                    <td data-label="Consultant">${formatCell(getValue(row, header, "on_call_consultant"))}</td>
                </tr>`;
        }
    }
    tbody.innerHTML = rowsHTML || "<tr><td colspan='5'>No data for this date.</td></tr>";
}

init();
</script>
</body>
</html>
