<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trauma & Emergency Medicine On-call Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#0f172a}
header{text-align:center;padding:20px;background:#ffffffcc;backdrop-filter: blur(12px);border-bottom:1px solid #e2e8f0;position:sticky;top:0}
.logo{height:45px;margin-bottom:8px}
header h2{font-size:1.3rem;font-weight:600;color:#1e3a8a}
.controls{margin-top:12px}
input{padding:10px;border-radius:10px;border:1px solid #cbd5e1}
button{margin-top:10px;padding:10px 20px;border:none;border-radius:10px;background:#1e3a8a;color:white;display:block;margin:auto}
.container{padding:15px;max-width:1000px;margin:auto}

.table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

.table th, .table td{
  padding:12px;
  border-bottom:1px solid #e2e8f0;
  text-align:center;
  font-size:14px;
}

.table th{
  background:#1e3a8a;
  color:white;
}

.name{
  color:#1e3a8a;
  font-weight:600;
  cursor:pointer;
}

.null{
  color:#94a3b8;
}

.empty{text-align:center;margin-top:30px}
.empty img{width:140px}
</style>
</head>

<body>

<header>
<img src="https://website.aiimsraipur.edu.in/web_image/lg1.png" class="logo">
<h2>Trauma & Emergency Medicine On-call Dashboard</h2>

<div class="controls">
<input type="date" id="datePicker"><br>
<button onclick="init()">Update</button>
</div>
</header>

<div class="container">
<div id="output"></div>
</div>

<script>
const CONTACT_FILE = "call_data/contact_details.csv";

// 🔴 ADD YOUR DEPARTMENTS HERE
const DEPARTMENTS = [
  "ctvs",
  "medicine",
  "surgery"
];

function formatDate(d){
  const day = String(d.getDate()).padStart(2,'0');
  const month = String(d.getMonth()+1).padStart(2,'0');
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

const now=new Date();
if(now.getHours()<8){now.setDate(now.getDate()-1)}
// keep input in YYYY-MM-DD but convert for matching later
document.getElementById("datePicker").value = now.toISOString().split('T')[0];

async function loadCSV(file){
  try{
    const res=await fetch(file);
    if(!res.ok) return null;
    const text=await res.text();
    return text.split("\n").map(r=>r.split(","));
  }catch{return null}
}

function findRow(data,date){
  if(!data) return null;
  const header=data[0];
  const dateIndex=header.indexOf("date");
  return data.find((r,i)=>i>0 && r[dateIndex]===date);
}

function getValue(row,header,key){
  const idx=header.indexOf(key);
  return idx!==-1 && row[idx] ? row[idx] : "<null>";
}

let CONTACTS=[];

async function handleCall(name){
  if(name==="<null>") return;

  if(CONTACTS.length===0){
    CONTACTS=await loadCSV(CONTACT_FILE);
  }

  const row=CONTACTS?.find(r=>r[0].trim()===name.trim());
  if(row){window.location.href=`tel:${row[1]}`}
  else alert("Number not found for "+name);
}

function formatCell(name){
  if(name==="<null>") return `<span class='null'>&lt;null&gt;</span>`;
  return `<span class='name' onclick="handleCall('${name}')">${name}</span>`;
}

async function init(){
  const rawDate = document.getElementById("datePicker").value;

  // convert YYYY-MM-DD → DD/MM/YYYY
  const parts = rawDate.split('-');
  const date = `${parts[2]}/${parts[1]}/${parts[0]}`;
  const out=document.getElementById("output");

  let rowsHTML = "";

  for(const dept of DEPARTMENTS){
    const file=`call_data/${dept}.csv`;
    const data=await loadCSV(file);

    if(!data){
      rowsHTML += `<tr><td>${dept.toUpperCase()}</td><td colspan="4" class="null">No file</td></tr>`;
      continue;
    }

    const header=data[0];
    const row=findRow(data,date);

    if(!row){
      rowsHTML += `<tr><td>${dept.toUpperCase()}</td><td colspan="4" class="null">No data</td></tr>`;
      continue;
    }

    rowsHTML += `
      <tr>
        <td><b>${dept.toUpperCase()}</b></td>
        <td>${formatCell(getValue(row,header,"on_call1"))}</td>
        <td>${formatCell(getValue(row,header,"on_call2"))}</td>
        <td>${formatCell(getValue(row,header,"on_call_SR"))}</td>
        <td>${formatCell(getValue(row,header,"on_call_consultant"))}</td>
      </tr>
    `;
  }

  out.innerHTML = `
    <table class="table">
      <tr>
        <th>Department</th>
        <th>On Call 1</th>
        <th>On Call 2</th>
        <th>SR</th>
        <th>Consultant</th>
      </tr>
      ${rowsHTML}
    </table>
  `;
}

init();
</script>

</body>
</html>
